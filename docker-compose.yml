version: "3.8"

services:
  route53-updater:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: route53-updater
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Webhook 接收端口（建议前置 Nginx/Caddy 做 TLS 终止）
      - "${WEBHOOK_PORT:-9090}:9090"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      # 持久化日志
      - route53-logs:/app/logs
      - route53-data:/app/data
    healthcheck:
      test: ["CMD", "pgrep", "crond"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  route53-logs:
    driver: local
  route53-data:
    driver: local